<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripKinaa | AI Travel Guide</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .sinhala-text { font-family: 'Noto Sans Sinhala', sans-serif; }
        .bg-hero { background-image: url('https://images.unsplash.com/photo-1620024541571-0811e9f2d591?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; }
        .glass { background: rgba(250, 245, 235, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1); }
        .category-card { transition: all 0.3s ease; }
        .category-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #5a7c6a; border-radius: 4px; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #3b5249; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; margin: 0 2px; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-hero min-h-screen flex flex-col relative">

    <div class="absolute inset-0 bg-white/30 backdrop-blur-[2px] z-0"></div>

    <nav class="relative z-10 w-full px-8 py-6 flex justify-between items-center bg-gradient-to-b from-[#f9f5eb] to-transparent">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
            <div class="text-[#3b5249] text-4xl"><i class="fa-solid fa-lion"></i></div>
            <div>
                <h1 class="text-2xl font-bold text-[#1e3026] leading-none tracking-wide">TRIPKINAA</h1>
                <p class="text-sm font-semibold text-[#5a7c6a] tracking-widest">AI TRAVEL GUIDE</p>
            </div>
        </div>
        <div class="hidden md:flex gap-8 items-center font-medium text-[#2d4036]">
            <a href="#" class="bg-[#dcb68a] text-[#1e3026] px-5 py-2 rounded-full font-semibold transition hover:bg-[#c9a377]">Home</a>
            <a href="#" class="hover:text-[#dcb68a] transition">Destinations</a>
            <a href="#" class="hover:text-[#dcb68a] transition">About</a>
        </div>
    </nav>

    <main class="relative z-10 flex-grow flex flex-col items-center pt-10 px-4 w-full max-w-5xl mx-auto h-full">
        
        <div id="welcome-text" class="text-center mb-10 text-[#1e3026] transition-all duration-500">
            <h2 class="sinhala-text text-5xl md:text-6xl font-bold mb-4 drop-shadow-md">ආයුබෝවන්!</h2>
            <p class="text-lg md:text-xl font-medium drop-shadow text-[#2d4036]">Welcome! Your Sri Lanka journey begins.</p>
        </div>

        <form id="ai-form" class="w-full max-w-3xl glass rounded-full flex items-center p-2 mb-8 hover:shadow-lg transition relative z-20">
            <div class="flex-grow flex flex-col items-start px-6">
                <input type="text" id="ai-input" autocomplete="off"
                    class="w-full bg-transparent outline-none text-[#1e3026] text-lg font-medium placeholder-[#5a7c6a]"
                    placeholder="Ask about historical sites, prices, routes...">
            </div>
            <button type="submit" id="send-btn" class="bg-[#dcb68a] hover:bg-[#c9a377] text-[#1e3026] w-14 h-14 rounded-full flex justify-center items-center text-xl transition transform hover:scale-105">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

        <div id="category-cards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 w-full px-4 transition-all duration-500 opacity-100">
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-solid fa-tree"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">ජය ශ්‍රී මහා බෝධිය</h4></div>
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-solid fa-map-location-dot"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">අටමස්ථානය</h4></div>
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-brands fa-pageline"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">රුවන්වැලිසෑය</h4></div>
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-solid fa-building-columns"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">ඓතිහාසික නටබුන්</h4></div>
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-solid fa-person-hiking"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">ඇවිදීමට ස්ථාන</h4></div>
            <div class="glass category-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer"><div class="text-4xl text-[#3b5249] mb-4"><i class="fa-solid fa-hands-praying"></i></div><h4 class="sinhala-text text-sm font-bold text-[#1e3026] text-center">සංස්කෘතික</h4></div>
        </div>

        <div id="chat-container" class="hidden w-full max-w-4xl glass rounded-3xl p-6 h-[55vh] flex flex-col shadow-2xl transition-all duration-500 mb-8 border border-[#dcb68a]/50">
            <div class="flex justify-between items-center mb-4 border-b border-[#5a7c6a]/20 pb-2">
                <span class="text-sm font-bold text-[#3b5249]"><i class="fa-solid fa-robot mr-2"></i>TripKinaa AI Assistant</span>
                <button id="btn-reset" class="text-xs text-[#7a9988] hover:text-red-500 transition"><i class="fa-solid fa-rotate-right mr-1"></i>Reset</button>
            </div>
            <div id="chat-display" class="flex-grow overflow-y-auto space-y-5 pr-2 pb-4"></div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyA8MAZcnMfEsAC-HashVxfbnRsEyfnvJs4",
            authDomain: "chatapp-b0bd9.firebaseapp.com",
            projectId: "chatapp-b0bd9",
            storageBucket: "chatapp-b0bd9.firebasestorage.app",
            messagingSenderId: "649239462676",
            appId: "1:649239462676:web:c2a36f55fc3b6cf7e5b801",
            measurementId: "G-SBWLFSFQC7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "knowledge_base", "travel_data");

        // AI Setup
        const OPENROUTER_API_KEY = "YOUR_API_KEY_HERE"; // ⚠️ PUT YOUR API KEY HERE
        const MODEL = "nvidia/llama-3.1-nemotron-70b-instruct"; 
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";

        const aiForm = document.getElementById('ai-form');
        const aiInput = document.getElementById('ai-input');
        const chatDisplay = document.getElementById('chat-display');
        const welcomeText = document.getElementById('welcome-text');
        const categoryCards = document.getElementById('category-cards');
        const chatContainer = document.getElementById('chat-container');
        const btnReset = document.getElementById('btn-reset');

        let isChatActive = false;
        let chatHistory = [];

        async function getLiveData() {
            try {
                const docSnap = await getDoc(docRef);
                return docSnap.exists() ? docSnap.data().content : "No data available.";
            } catch (err) {
                console.error(err);
                return "Error fetching data.";
            }
        }

        aiForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = aiInput.value.trim();
            if (!text) return;

            if (!isChatActive) {
                welcomeText.classList.add('hidden');
                categoryCards.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                isChatActive = true;
            }

            appendMessage('user', text);
            aiInput.value = '';
            chatHistory.push({ role: "user", content: text });

            const loadingId = showLoading();

            try {
                // Fetch the latest data from the database right before asking AI
                const liveData = await getLiveData();

                let messages = [
                    {
                        role: "system",
                        content: `You are TripKinaa AI, a friendly travel guide. USE THIS LIVE DATA TO ANSWER: \n\n${liveData}\n\n Keep answers formatted and short.`
                    },
                    ...chatHistory
                ];

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "http://localhost",
                    },
                    body: JSON.stringify({ model: MODEL, messages: messages, temperature: 0.3 })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.error) {
                    appendMessage('system', "Error: " + data.error.message);
                } else {
                    const aiText = data.choices[0].message.content;
                    appendMessage('ai', aiText);
                    chatHistory.push({ role: "assistant", content: aiText });
                }

            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('system', "Connection Error.");
            }
        });

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = "flex items-start gap-4 animate-fade-in";
            let avatar, bubbleClass;
            
            if (role === 'user') {
                div.classList.add('flex-row-reverse');
                avatar = `<div class="w-10 h-10 rounded-full bg-[#3b5249] flex-shrink-0 flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-user"></i></div>`;
                bubbleClass = "bg-[#3b5249] text-white rounded-2xl rounded-tr-sm px-5 py-3 ml-auto max-w-[80%] shadow-md text-sm";
            } else {
                avatar = `<div class="w-10 h-10 rounded-full bg-[#dcb68a] flex-shrink-0 flex items-center justify-center text-[#1e3026] shadow-md"><i class="fa-solid fa-lion"></i></div>`;
                bubbleClass = "bg-white/80 text-[#1e3026] rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%] shadow-sm border border-[#dcb68a]/30 text-sm message-content";
            }

            const contentHtml = role === 'ai' ? marked.parse(text) : text;
            div.innerHTML = `${avatar}<div class="${bubbleClass}">${contentHtml}</div>`;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        function showLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex items-start gap-4";
            div.innerHTML = `<div class="w-10 h-10 rounded-full bg-[#dcb68a] flex-shrink-0 flex items-center justify-center text-[#1e3026] shadow-md"><i class="fa-solid fa-lion"></i></div><div class="bg-white/80 rounded-2xl rounded-tl-sm px-5 py-4 shadow-sm border border-[#dcb68a]/30 flex items-center"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return id;
        }

        btnReset.addEventListener('click', () => {
            chatDisplay.innerHTML = '';
            chatHistory = [];
            welcomeText.classList.remove('hidden');
            categoryCards.classList.remove('hidden');
            chatContainer.classList.add('hidden');
            isChatActive = false;
        });
    </script>
</body>
</html>
